version: "3.9"

services:
  e2e:
    build:
      context: .
      dockerfile: e2e/Dockerfile
    working_dir: /e2e
    volumes:
      - push-data:/data
    command: ["/e2e/run_all.sh"]
    environment:
      - E2E_PORT=3000
      - E2E_OUTPUT_DIR=/data
      - E2E_SEND_PUSH=1
      - DISPLAY=:99

volumes:
  push-data:
