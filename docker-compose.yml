version: "3.9"

services:
  e2e:
    build:
      context: .
      dockerfile: e2e/Dockerfile
    working_dir: /e2e
    volumes:
      - push-data:/data
    command: ["/e2e/run_all.sh"]
    environment:
      - E2E_PORT=3000
      - E2E_OUTPUT_DIR=/data
      - E2E_SEND_PUSH=1
      - DISPLAY=:99

  dev-tests:
    image: rust:1.91-slim-bookworm
    working_dir: /work
    volumes:
      - .:/work
      - cargo-git:/usr/local/cargo/git
      - cargo-registry:/usr/local/cargo/registry
      - target:/work/target
      - ./scripts/run_cargo_tests.sh:/work/scripts/run_cargo_tests.sh:ro
    command: ["/work/scripts/run_cargo_tests.sh"]

volumes:
  push-data:
  cargo-git:
  cargo-registry:
  target:
