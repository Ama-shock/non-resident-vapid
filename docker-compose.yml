version: "3.9"

services:
  app:
    build: .
    working_dir: /app
    command: ["cargo", "test"]
    volumes:
      - .:/app
      - cargo-git:/usr/local/cargo/git
      - cargo-registry:/usr/local/cargo/registry
      - target:/app/target
    environment:
      - CARGO_TERM_COLOR=always

volumes:
  cargo-git:
  cargo-registry:
  target:
